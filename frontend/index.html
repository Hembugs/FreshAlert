<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
  <title>FreshAlert</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
    }

    header {
      background: #16213e;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #0f3460;
    }

    header h1 {
      font-size: 1.4rem;
      color: #e94560;
    }

    #add-btn {
      background: #e94560;
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 1.5rem;
      cursor: pointer;
    }

    #product-list {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .product-card {
      background: #16213e;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid #e94560;
    }

    .product-card.warning { border-left-color: #f5a623; }
    .product-card.urgent { border-left-color: #e94560; }
    .product-card.ok { border-left-color: #2ecc71; }

    .product-name { font-size: 1rem; font-weight: 600; }
    .product-expiry { font-size: 0.8rem; color: #aaa; margin-top: 4px; }

    .delete-btn {
      background: none;
      border: none;
      color: #e94560;
      font-size: 1.2rem;
      cursor: pointer;
    }

    /* Modal */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: flex-end;
    }

    #modal.open { display: flex; }

    #modal-content {
      background: #16213e;
      border-radius: 20px 20px 0 0;
      padding: 24px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #modal-content h2 { color: #e94560; }

    input {
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 12px;
      color: #eee;
      font-size: 1rem;
      width: 100%;
    }

    #scan-btn, #save-btn {
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
    }

    #scan-btn { background: #0f3460; }

    #camera-container {
      display: none;
      position: fixed;
      inset: 0;
      background: black;
      z-index: 100;
      flex-direction: column;
    }

    #camera-container.open { display: flex; }

    #camera-feed {
      width: 100%;
      flex: 1;
      object-fit: cover;
    }

    #cancel-scan {
      background: #e94560;
      color: white;
      border: none;
      padding: 16px;
      font-size: 1rem;
      cursor: pointer;
    }

    #empty-state {
      text-align: center;
      color: #555;
      margin-top: 60px;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>🥦 FreshAlert</h1>
    <button id="add-btn">+</button>
  </header>

  <div id="product-list"></div>
  <div id="empty-state">No products yet — tap + to add one</div>

  <!-- Add Product Modal -->
  <div id="modal">
    <div id="modal-content">
      <h2>Add Product</h2>
      <button id="scan-btn">📷 Scan Barcode</button>
      <input id="name-input" type="text" placeholder="Product name">
      <input id="expiry-input" type="date">
      <button id="save-btn">Save Product</button>
    </div>
  </div>

  <!-- Camera -->
  <div id="camera-container">
    <video id="camera-feed" autoplay playsinline></video>
    <button id="cancel-scan">Cancel</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
